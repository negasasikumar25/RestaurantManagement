<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Billing</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 30px;
      background: #f5f5f5;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border: 1px solid #ddd;
    }
    h2 {
      text-align: center;
    }
    .menu, .cart {
      margin-top: 30px;
    }
    .menu select, .menu input {
      padding: 5px;
      margin-right: 10px;
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }
    th {
      background-color: #007bff;
      color: white;
      padding: 10px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }
    .total {
      text-align: right;
      font-weight: bold;
    }
    .blue-btn {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
      font-weight: bold;
    }
    .blue-btn:hover {
      background-color: #28a745;
    }
    @media print {
      .no-print {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="receipt">
    <h2>Billing</h2>
    <p><strong>Date:</strong> <span id="todayDate"></span></p>

    <div class="menu no-print">
      <select id="menuItem">
        <option value="Dosa|50">Dosa - ₹50</option>
        <option value="Poori|50">Poori - ₹50</option>
        <option value="mini idly|80">Mini Idly - ₹80</option>
        <option value="vada|20">Vada - ₹20</option>
        <option value="chicken 65|180">Chicken 65 - ₹180</option>
        <option value="chicken biryani|200">Chicken biryani - ₹200</option>
        <option value="fish fry|180">Fish fry - ₹180</option>
        <option value="parota|50">Parota - ₹50</option>
        <option value="coffee|25">Coffee - ₹25</option>
        <option value="ice cream|80">Ice cream - ₹80</option>
      </select>
      <input type="number" id="qty" placeholder="Qty" min="1" value="1">
      <button class="blue-btn" onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="cart">
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Price (₹)</th>
            <th>Total (₹)</th>
            <th class="no-print">Action</th>
          </tr>
        </thead>
        <tbody id="cartBody">
          <!-- items go here -->
        </tbody>
        <tfoot>
          <tr>
            <td colspan="3" class="total">Subtotal</td>
            <td colspan="2" id="subtotal">₹0.00</td>
          </tr>
          <tr>
            <td colspan="3" class="total">Tax (10%)</td>
            <td colspan="2" id="tax">₹0.00</td>
          </tr>
          <tr>
            <td colspan="3" class="total">Total</td>
            <td colspan="2" id="total">₹0.00</td>
          </tr>
        </tfoot>
      </table>
    </div>

    <button class="blue-btn no-print" onclick="printReceipt()">Print Receipt</button>
  </div>

  <script>
    const cart = [];

    function addToCart() {
      const itemSelect = document.getElementById("menuItem");
      const [name, price] = itemSelect.value.split("|");
      const qty = parseInt(document.getElementById("qty").value);

      if (qty <= 0) return alert("Enter valid quantity.");

      const item = {
        name,
        qty,
        price: parseFloat(price)
      };

      cart.push(item);
      renderCart();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      renderCart();
    }

    function renderCart() {
      const tbody = document.getElementById("cartBody");
      tbody.innerHTML = "";
      let subtotal = 0;

      cart.forEach((item, index) => {
        const total = item.qty * item.price;
        subtotal += total;

        const row = `
          <tr>
            <td>${item.name}</td>
            <td>${item.qty}</td>
            <td>${item.price.toFixed(2)}</td>
            <td>${total.toFixed(2)}</td>
            <td class="no-print"><button onclick="removeItem(${index})">Delete</button></td>
          </tr>
        `;
        tbody.innerHTML += row;
      });

      const tax = subtotal * 0.1;
      const grandTotal = subtotal + tax;

      document.getElementById("subtotal").textContent = `₹${subtotal.toFixed(2)}`;
      document.getElementById("tax").textContent = `₹${tax.toFixed(2)}`;
      document.getElementById("total").textContent = `₹${grandTotal.toFixed(2)}`;
    }

    function printReceipt() {
      window.print();
    }

    document.getElementById("todayDate").textContent = new Date().toLocaleDateString();
  </script>
</body>
</html>
