<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant Admin Panel</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f4f4;
    }
    .sidebar {
      height: 100vh;
      width: 220px;
      position: fixed;
      background-color: #2c3e50;
      padding-top: 20px;
      color: white;
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }
    .sidebar a {
      display: block;
      padding: 15px;
      color: white;
      text-decoration: none;
    }
    .sidebar a:hover {
      background-color: #34495e;
    }
    .main {
      margin-left: 220px;
      padding: 20px;
    }
    .dashboard {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .card {
      flex: 1 1 200px;
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .card h3 {
      margin: 0 0 10px;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>Admin Panel</h2>
    <a href="#">Dashboard</a>
    <a href="menu1.html">Menu</a>
    <a href="billing.html">Billing</a>
    <a href="staff.html">Staff</a>
    <a href="customer.html">Customer</a>
    <a href="reports.html">Reports</a>
  </div>

  <div class="main">
    <h1>Dashboard</h1>
    <div class="dashboard">
      <div class="card">
        <h3>Total Orders</h3>
        <p>120</p>
      </div>
      <div class="card">
        <h3>Pending Reservations</h3>
        <p>8</p>
      </div>
      <div class="card">
        <h3>Menu Items</h3>
        <p>10</p>
      </div>
      <div class="card">
        <h3>Users</h3>
        <p>11</p>
      </div>
    </div>
  </div>

</body>
</html>
